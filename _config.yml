title: Study Notes
description: Personal technical learning, data organization and daily records
baseurl: ""
url: "https://yifree.github.io"
timezone: Asia/Shanghai
encoding: utf-8

# Pagination
paginate: 12
paginate_path: "/page/:num/"

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 1..3

gitalk:
  # Get the following information by creating an OAuth app in GitHub Developer Settings
  # Steps: Settings -> Developer settings -> OAuth Apps -> New OAuth App
  # Homepage URL: https://yifree.github.io/
  # Authorization callback URL: https://yifree.github.io/
  clientID: YOUR_CLIENT_ID
  clientSecret: YOUR_CLIENT_SECRET
  repo: yifree.github.io
  owner: yifree
  admin: [yifree]
  distractionFreeMode: true

